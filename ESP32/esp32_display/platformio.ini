; PlatformIO Project Configuration File
;
; ESP32 Display Receiver
; Receives binary display data via HTTP and shows on I2C SSD1306

[env:esp32c3]
platform = espressif32
board = esp32-c3-devkitm-1
framework = arduino
monitor_speed = 115200

; Required libraries
lib_deps =
    adafruit/Adafruit SSD1306@^2.5.7
    adafruit/Adafruit GFX Library@^1.11.5
    adafruit/Adafruit BusIO@^1.14.1
    esphome/ESPAsyncWebServer-esphome@^3.1.0
    https://github.com/sfranzyshen/ESP-Arduino-Lua.git

; Build flags
build_flags =
    -DCORE_DEBUG_LEVEL=0
    -DARDUINO_USB_CDC_ON_BOOT=1

; ============ USB Upload (default) ============
; Uncomment and adjust COM port for USB upload
; upload_port = COM3
; monitor_port = COM3

; ============ OTA Upload (WiFi) ============
; To upload via WiFi, uncomment and set ESP32 IP:
; upload_protocol = espota
; upload_port = 192.168.178.xxx

; Or use command line:
; pio run -t upload --upload-port 192.168.178.xxx
